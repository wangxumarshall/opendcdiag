# ARM64 (AArch64) cross-compilation configuration for OpenDCDiag

[binaries]
c = 'aarch64-linux-gnu-gcc'
cpp = 'aarch64-linux-gnu-g++'
ar = 'aarch64-linux-gnu-ar'
strip = 'aarch64-linux-gnu-strip'
pkgconfig = 'aarch64-linux-gnu-pkg-config'

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'armv8'
endian = 'little'

[properties]
needs_exe_wrapper = true

[run_machine]
# The machine to run tests on (if different from host)
system = 'linux'
cpu_family = 'aarch64'
cpu = 'armv8'
endian = 'little'
